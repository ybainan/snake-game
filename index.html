<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  >
  <meta
    name="description"
    content="适合手机与桌面操作的霓虹风贪吃蛇网页游戏。"
  >
  <title>霓虹贪吃蛇 | Neon Snake</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-orb bg-orb-cyan"></div>
  <div class="bg-orb bg-orb-fuchsia"></div>

  <main id="login-page" class="page active" aria-labelledby="login-title">
    <section class="login-card glass-panel">
      <p class="eyebrow">Button First Snake</p>
      <h1 id="login-title" class="gradient-title">霓虹贪吃蛇</h1>
      <p class="login-copy">
        手机端只保留底部方向按键，减少误触；桌面端仍支持方向键或
        <span class="nowrap">WASD</span>。
      </p>

      <div class="login-form">
        <label class="input-group" for="username-input">
          <span>玩家昵称</span>
          <input
            type="text"
            id="username-input"
            placeholder="输入你的昵称"
            maxlength="12"
            autocomplete="off"
          >
        </label>

        <button id="login-btn" class="primary-btn" disabled>
          <span>进入游戏</span>
          <span class="btn-icon" aria-hidden="true">→</span>
        </button>

        <div class="divider">
          <span>或</span>
        </div>

        <button id="guest-btn" class="secondary-btn" type="button">
          游客快速开始
        </button>
      </div>

      <ul class="login-tips">
        <li>手机端：使用下方按键控制，暂停和重开在按键区上方。</li>
        <li>桌面端：方向键或 WASD 移动，空格暂停或继续。</li>
      </ul>
    </section>
  </main>

  <main id="game-page" class="page" aria-labelledby="player-name">
    <div class="game-shell">
      <header class="hud-bar glass-panel">
        <div class="hud-top">
          <div class="player-block">
            <div class="avatar-ring" aria-hidden="true">
              <div class="avatar" id="player-avatar">S</div>
            </div>
            <div class="player-copy">
              <p class="eyebrow">Current Player</p>
              <h2 id="player-name">玩家</h2>
              <p id="login-time" class="muted-text">--:--:--</p>
            </div>
          </div>

          <button id="logout-btn" class="mini-action danger-btn" type="button">
            退出
          </button>
        </div>

        <div class="status-strip" aria-label="当前状态">
          <div class="status-chip">
            <span class="status-label">得分</span>
            <strong id="current-score">0</strong>
          </div>
          <div class="status-chip">
            <span class="status-label">长度</span>
            <strong id="snake-length">3</strong>
          </div>
          <div class="status-chip">
            <span class="status-label">速度</span>
            <strong id="game-speed">1x</strong>
          </div>
          <div class="status-chip">
            <span class="status-label">最高分</span>
            <strong id="best-score">0</strong>
          </div>
        </div>
      </header>

      <section class="play-layout">
        <section class="play-stage">
          <div id="touch-surface" class="canvas-shell glass-panel">
            <canvas
              id="game-canvas"
              width="480"
              height="480"
              aria-label="游戏棋盘"
            ></canvas>

            <div id="overlay" class="canvas-overlay active">
              <div class="overlay-card">
                <p class="eyebrow">Game Ready</p>
                <h3 id="overlay-title" class="gradient-title">准备开玩</h3>
                <p id="overlay-message" class="overlay-message">
                  点击开始。手机端请使用下方按键操作；桌面端也支持键盘。
                </p>
                <button id="overlay-btn" class="primary-btn overlay-btn">
                  <span>开始游戏</span>
                </button>
              </div>
            </div>
          </div>

          <div class="touch-controls">
            <div class="dpad glass-panel" aria-label="方向控制">
              <button
                id="pause-btn"
                type="button"
                class="dpad-utility dpad-pause"
              >
                <span class="action-kicker">Pause</span>
                <span id="pause-label">暂停</span>
              </button>
              <button
                type="button"
                class="dpad-btn dpad-up"
                data-dir="up"
                aria-label="向上"
              >↑</button>
              <button
                id="restart-btn"
                type="button"
                class="dpad-utility dpad-restart"
              >
                <span class="action-kicker">Reset</span>
                <span>重开</span>
              </button>
              <button
                type="button"
                class="dpad-btn dpad-left"
                data-dir="left"
                aria-label="向左"
              >←</button>
              <div class="dpad-gap" aria-hidden="true"></div>
              <button
                type="button"
                class="dpad-btn dpad-right"
                data-dir="right"
                aria-label="向右"
              >→</button>
              <button
                type="button"
                class="dpad-btn dpad-down"
                data-dir="down"
                aria-label="向下"
              >↓</button>
            </div>
          </div>
        </section>
      </section>
    </div>
  </main>

  <script src="app.js?v=4.0"></script>
</body>
</html>

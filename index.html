<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="霓虹贪吃蛇 - 一个拥有炫酷视觉效果的网页版贪吃蛇游戏">
  <title>霓虹贪吃蛇 | Neon Snake</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 动态背景发光球体 -->
  <div class="bg-orb bg-orb-cyan"></div>
  <div class="bg-orb bg-orb-fuchsia"></div>

  <!-- ====== 登录页面 ====== -->
  <div id="login-page" class="page active">
    <div class="glass-container login-container">
      <h1 class="gradient-title">霓虹贪吃蛇</h1>
      <p class="subtitle">NEON SNAKE</p>
      <div class="login-form">
        <div class="input-group">
          <label for="username-input">玩家昵称</label>
          <input type="text" id="username-input" placeholder="输入你的昵称..." maxlength="12" autocomplete="off">
        </div>
        <button id="login-btn" class="neon-btn" disabled>
          <span>开始游戏</span>
          <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
        <div class="divider-or">
          <span>或</span>
        </div>
        <button id="guest-btn" class="ghost-btn">
          <span>🎮 游客模式快速开始</span>
        </button>
      </div>
      <div class="login-footer">
        <p>使用方向键或 WASD 控制蛇的移动</p>
      </div>
    </div>
  </div>

  <!-- ====== 游戏页面 ====== -->
  <div id="game-page" class="page">
    <div class="game-layout">
      <!-- 左侧面板：玩家信息与统计 -->
      <aside class="glass-container side-panel left-panel">
        <div class="player-info">
          <div class="avatar-ring">
            <div class="avatar" id="player-avatar">🐍</div>
          </div>
          <h2 id="player-name" class="player-name">玩家</h2>
          <p class="login-time" id="login-time">--:--:--</p>
        </div>
        <div class="stats-section">
          <h3 class="section-title">本局数据</h3>
          <div class="stat-card">
            <span class="stat-label">当前得分</span>
            <span class="stat-value" id="current-score">0</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">蛇身长度</span>
            <span class="stat-value" id="snake-length">3</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">游戏速度</span>
            <span class="stat-value" id="game-speed">1x</span>
          </div>
        </div>
        <div class="stats-section">
          <h3 class="section-title">累计统计</h3>
          <div class="stat-card">
            <span class="stat-label">最高分</span>
            <span class="stat-value cyan" id="best-score">0</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">总游戏局数</span>
            <span class="stat-value" id="total-games">0</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">总吃到食物</span>
            <span class="stat-value" id="total-food">0</span>
          </div>
        </div>
      </aside>

      <!-- 中间：游戏画布 -->
      <main class="game-center">
        <div class="canvas-wrapper">
          <canvas id="game-canvas" width="480" height="480"></canvas>
          <!-- 游戏开始 / 暂停 / 结束的覆盖层 -->
          <div id="overlay" class="canvas-overlay active">
            <div class="overlay-content">
              <h2 id="overlay-title" class="gradient-title overlay-title">准备就绪</h2>
              <p id="overlay-message" class="overlay-message">按 <kbd>空格键</kbd> 或点击下方按钮开始</p>
              <button id="overlay-btn" class="neon-btn overlay-btn">
                <span>开始游戏</span>
              </button>
            </div>
          </div>
        </div>
        <div class="game-controls">
          <button id="pause-btn" class="control-btn" title="暂停/继续">
            <svg id="pause-icon" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><polygon points="5,3 19,12 5,21"/></svg>
          </button>
          <button id="restart-btn" class="control-btn" title="重新开始">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
          </button>
          <button id="logout-btn" class="control-btn" title="退出登录">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </main>

      <!-- 右侧面板：排行榜 -->
      <aside class="glass-container side-panel right-panel">
        <h3 class="section-title">🏆 排行榜</h3>
        <div id="leaderboard" class="leaderboard">
          <p class="empty-text">暂无记录</p>
        </div>
        <h3 class="section-title" style="margin-top:24px;">📜 最近记录</h3>
        <div id="recent-games" class="recent-games">
          <p class="empty-text">暂无记录</p>
        </div>
      </aside>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
